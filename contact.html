<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Riccardo Riva</title>
    
    <!-- 1. Load Tailwind Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Optimized Tailwind Configurations (Moved right under CDN script) -->
    <script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ["Plus Jakarta Sans", "sans-serif"], }
                }
            }
        }
    </script>
                }
            }
        }
    </script>
    
    <!-- 3. Typography & Brand Identity Assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/images/Duerre media logo red.png">
    
    <!-- 4. Global Custom Styles Override -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans bg-theme text-theme min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-theme">

<!-- Header -->
<div id="navbar-container" class="w-full"></div>

<!-- Contact Form Section -->
<main class="flex-grow flex items-center justify-center px-4 py-16 mt-8">
    <div class="w-full max-w-lg bg-theme-surface border border-theme rounded-sm p-8 md:p-10 ">
        
        <form action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
            <!-- Web3Forms Access Key Token Injection -->
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

            <div>
                <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-theme-muted mb-2">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required 
                       class="w-full bg-theme border border-theme rounded-sm px-4 py-3 text-theme placeholder:text-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all">
            </div>

            <div>
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-theme-muted mb-2">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required 
                       class="w-full bg-theme border border-theme rounded-sm px-4 py-3 text-theme placeholder:text-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all">
            </div>

            <div>
                <label for="message" class="block text-xs font-semibold uppercase tracking-wider text-theme-muted mb-2">Message</label>
                <textarea id="message" name="message" placeholder="Your Message..." required rows="4"
                          class="w-full bg-theme border border-theme rounded-sm px-4 py-3 text-theme placeholder:text-zinc-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all resize-none"></textarea>
            </div>

            <input type="hidden" name="redirect" value="https://riccardoduerre.github.io/duerre/">

            <button type="submit" class="w-full bg-theme-accent text-theme font-medium rounded-sm py-3 hover:opacity-90 active:scale-[0.99] transition-all">
                Send Message
            </button>
        </form>
    </div>
</main>

<!-- Footer -->
<div id="footer-container" class="w-full"></div>

<!-- Scripts -->
<script src="navbar/loadNavbar.js"></script>
<script src="i18n.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
