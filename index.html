<!-- Preserved Functional Lightbox Layer -->
<div id="lightbox" class="lightbox fixed inset-0 bg-[#090a0d]/95 hidden items-center justify-center z-50 transition-all duration-300">
    <button class="close absolute top-6 right-8 text-gray-400 hover:text-white text-4xl transition-colors">&times;</button>
    <button class="prev absolute left-6 text-gray-400 hover:text-white text-4xl transition-all hover:scale-110">&lt;</button>
    <img src="" alt="Full-screen image" class="block mx-auto rounded-lg shadow-2xl w-auto h-auto max-w-[85vw] max-h-[85vh] object-contain border border-zinc-800">
    <button class="next absolute right-6 text-gray-400 hover:text-white text-4xl transition-all hover:scale-110">&gt;</button>
</div>

<!-- Scripts Structure Preserved Exactly -->
<script src="navbar/loadNavbar.js"></script>
<script src="i18n.js"></script>
<script>
    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    if(menuToggle && mobileMenu) {
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('translate-x-full');
        });
    }

    // Header scroll behavior
    const header = document.querySelector('header');
    if(header) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('bg-[#0d0e12]', 'shadow-xl', 'border-b', 'border-zinc-800');
                header.classList.remove('bg-transparent');
            } else {
                header.classList.add('bg-transparent');
                header.classList.remove('bg-[#0d0e12]', 'shadow-xl', 'border-b', 'border-zinc-800');
            }
        });
    }

    // Language selector
    const langButton = document.getElementById("langButton");
    const langDropdown = document.getElementById("langDropdown");
    const langFlag = document.getElementById("langFlag");
    const langCode = document.getElementById("langCode");
    let currentLang = "it";

    if(langButton && langDropdown) {
        langButton.addEventListener("click", () => langDropdown.classList.toggle("hidden"));
        langDropdown.querySelectorAll("li").forEach(item => {
            item.addEventListener("click", () => {
                const lang = item.dataset.lang;
                const flag = item.dataset.flag;
                if(langFlag) { langFlag.src = flag; langFlag.alt = lang; }
                if(langCode) langCode.textContent = lang.toUpperCase();
                currentLang = lang;
                langDropdown.classList.add("hidden");
                if(typeof updateTexts === 'function') updateTexts(lang);
            });
        });
        document.addEventListener("click", e => {
            if (!langButton.contains(e.target) && !langDropdown.contains(e.target)) {
                langDropdown.classList.add("hidden");
            }
        });
    }
    if(typeof updateTexts === 'function') updateTexts(currentLang);

    // Lightbox Functional Logic preserved
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox ? lightbox.querySelector('img') : null;
    const prevBtn = lightbox ? lightbox.querySelector('.prev') : null;
    const nextBtn = lightbox ? lightbox.querySelector('.next') : null;
    const closeBtn = lightbox ? lightbox.querySelector('.close') : null;
    let currentIndex = 0;

    if(lightbox && galleryItems.length > 0) {
        galleryItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentIndex = index;
                showImage(currentIndex);
            });
        });

        if(closeBtn) closeBtn.addEventListener('click', () => lightbox.classList.add('hidden'));
        if(prevBtn) {
            prevBtn.addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
                showImage(currentIndex);
            });
        }
        if(nextBtn) {
            nextBtn.addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % galleryItems.length;
                showImage(currentIndex);
            });
        }
    }

    function showImage(index) {
        if(!lightboxImg || !lightbox) return;
        const imgSrc = galleryItems[index].querySelector('img').src;
        lightboxImg.src = imgSrc;
        lightbox.classList.remove('hidden');
        lightbox.classList.add('flex');
    }
</script>
